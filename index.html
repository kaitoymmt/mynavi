<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首都高周回ナビ (高精度ルート版)</title>
    <!-- Leaflet.js (地図表示用ライブラリ) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .nav-panel {
            background: #1e1e1e;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            border-bottom: 2px solid #2e2e2e;
        }
        h1 { 
            font-size: 1.1rem; 
            margin: 0 0 8px 0; 
            color: #00e676; 
            text-align: center;
        }
        .nav-instruction { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 6px;
            text-align: center;
        }
        .next-info { 
            font-size: 0.95rem; 
            color: #b0bec5; 
            line-height: 1.4;
            text-align: center;
            margin-bottom: 12px;
        }
        button {
            background: #00e676;
            color: #121212;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
        }
        button:disabled { 
            background: #424242; 
            color: #757575;
            box-shadow: none;
        }
        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }
        .status-bar {
            background: #1a1a1a;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #aaaaaa;
            border-top: 1px solid #2e2e2e;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="nav-panel">
    <h1>首都高周回ナビ (高精度版)</h1>
    <div class="nav-instruction" id="instruction">「開始」を押してください</div>
    <div class="next-info" id="nextInfo">GPSの判定半径を各JCTの構造に合わせて最適化しました。</div>
    <button id="startBtn">ナビゲーション開始</button>
</div>

<div id="map"></div>

<div class="status-bar" id="gpsStatus">
    GPS: 未接続 | 高架下や並走一般道での誤判定を防ぐロジックが有効です
</div>

<script>
// 【高精度チューニング】各JCTの実際の物理的な中心座標と、最適な判定半径(radius)を設定
const routePoints = [
    { 
        name: "みなとみらい入口", 
        lat: 35.4578, lng: 139.6310, radius: 400,
        hint: "首都高 K1 横羽線（上り）に入ります。左車線から本線へ合流してください。" 
    },
    { 
        name: "生麦JCT手前", 
        lat: 35.4925, lng: 139.6730, radius: 600,
        hint: "このまま K1 横羽線を直進し、羽田・東京方面へ進みます。" 
    },
    { 
        name: "羽田可動橋付近 (K1)", 
        lat: 35.5495, lng: 139.7510, radius: 700,
        hint: "まもなく東京都内に入ります。右側車線をキープして平和島方面へ。" 
    },
    { 
        name: "浜崎橋JCT", 
        lat: 35.6486, lng: 139.7613, radius: 350,
        hint: "右側2車線へ進み、「C1 都心環状線（内回り）銀座・江戸橋方面」へ分岐します。" 
    },
    { 
        name: "江戸橋JCT", 
        lat: 35.6817, lng: 139.7766, radius: 350,
        hint: "右側の「C1 向島・箱崎方面」の車線を維持してください。" 
    },
    { 
        name: "箱崎JCT", 
        lat: 35.6812, lng: 139.7865, radius: 300,
        hint: "左側の「9号 深川線・湾岸線方面」へ分岐します。ロータリー構造に入りますがそのまま9号線へ。" 
    },
    { 
        name: "辰巳JCT", 
        lat: 35.6436, lng: 139.8094, radius: 400,
        hint: "9号線の突き当たりを「右方向、B 湾岸線（下り）羽田・横浜方面」へ進みます。" 
    },
    { 
        name: "東海JCT付近 (湾岸線)", 
        lat: 35.5685, lng: 139.7645, radius: 700,
        hint: "湾岸線を直進します。羽田空港のトンネルを通過します。" 
    },
    { 
        name: "大黒JCT", 
        lat: 35.4615, lng: 139.6808, radius: 450,
        hint: "横浜ベイブリッジを渡るため、そのまま湾岸線を直進してください。大黒PAへも入れます。" 
    },
    { 
        name: "本牧JCT", 
        lat: 35.4290, lng: 139.6705, radius: 500,
        hint: "ベイブリッジ通過後、左側車線へ寄り「K3 狩場線・石川町JCT方面」へ進みます。" 
    },
    { 
        name: "石川町JCT", 
        lat: 35.4395, lng: 139.6425, radius: 350,
        hint: "JCTを「右方向、K1 横羽線・横浜駅方面」へ進み、すぐに出口の準備をします。" 
    },
    { 
        name: "横浜駅西口出口", 
        lat: 35.4688, lng: 139.6165, radius: 350,
        hint: "ここで首都高を降ります。一般道へ合流します。お疲れ様でした！" 
    }
];

let currentStep = 0;
let watchId = null;
let map, userMarker;
let pointMarkers = [];
let routeLine;

function initMap() {
    map = L.map('map', { zoomControl: false }).setView([35.56, 139.72], 11);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    const latlngs = routePoints.map(p => [p.lat, p.lng]);
    routeLine = L.polyline(latlngs, { color: '#00e676', weight: 4, opacity: 0.5, dashArray: '5, 10' }).addTo(map);

    routePoints.forEach((p, index) => {
        // 各JCTの検知範囲を薄い円で可視化（デバッグ・確認用）
        L.circle([p.lat, p.lng], {
            radius: p.radius,
            color: '#00b0ff',
            weight: 1,
            fillColor: '#00b0ff',
            fillOpacity: 0.05
        }).addTo(map);

        const marker = L.circleMarker([p.lat, p.lng], {
            radius: 6,
            fillColor: '#00b0ff',
            color: '#fff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
        }).addTo(map).bindPopup(`<b>${index + 1}. ${p.name}</b>`);
        pointMarkers.push(marker);
    });
}

function safeSpeak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP';
        window.speechSynthesis.speak(utterance);
    }
}

// 2点間の距離計算 (メートル)
function getDistance(lat1, lng1, lat2, lng2) {
    const r = 6378137;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return r * c;
}

function updateNavigation() {
    pointMarkers.forEach((m, idx) => {
        m.setStyle({ fillColor: idx < currentStep ? '#757575' : '#00b0ff' });
    });

    if (currentStep >= routePoints.length) {
        instructionText.innerText = "ゴールに到着！";
        nextInfoText.innerText = "横浜駅西口出口を出ました。お疲れ様でした。";
        safeSpeak("目的地周辺に到着しました。ナビゲーションを終了します。お疲れ様でした。");
        if (watchId) navigator.geolocation.clearWatch(watchId);
        return;
    }

    const currentPoint = routePoints[currentStep];
    instructionText.innerText = `次は：${currentPoint.name}`;
    nextInfoText.innerText = currentPoint.hint;
    
    if (pointMarkers[currentStep]) {
        pointMarkers[currentStep].setStyle({ fillColor: '#ff9100', radius: 9 });
    }
    
    safeSpeak(`次は、${currentPoint.name}です。${currentPoint.hint}`);
}

startBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
        alert("GPSに対応していません。");
        return;
    }

    safeSpeak(""); // iOS音声アクティベーション

    startBtn.disabled = true;
    startBtn.innerText = "高精度ナビ中...";
    currentStep = 0;
    updateNavigation();

    watchId = navigator.geolocation.watchPosition(
        (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            const speed = position.coords.speed; // m/s (取得できない場合はnull)

            gpsStatusText.innerHTML = `GPS精度: ±${Math.round(accuracy)}m | 速度: ${speed ? Math.round(speed * 3.6) : '--'} km/h`;

            // 【高精度化ロジック1】GPSの精度が極端に悪い(100m以上ズレている)データはノイズとして弾く
            if (accuracy > 100) return;

            if (!userMarker) {
                userMarker = L.marker([userLat, userLng]).addTo(map);
            } else {
                userMarker.setLatLng([userLat, userLng]);
            }
            
            map.setView([userLat, userLng], 14);

            if (currentStep < routePoints.length) {
                const target = routePoints[currentStep];
                const distance = getDistance(userLat, userLng, target.lat, target.lng);

                // 【高精度化ロジック2】各地点ごとに最適化した個別半径(target.radius)で進入判定
                if (distance < target.radius) {
                    
                    // 【高精度化ロジック3】一般道並走エリア(みなとみらい・横浜駅等)での誤認識防止
                    // 高速走行中(時速40km以上)か、またはJCT直下にいる場合のみ通過とする
                    if (target.name.includes("入口") || target.name.includes("出口") || speed === null || speed * 3.6 > 40) {
                        currentStep++;
                        updateNavigation();
                    }
                }
            }
        },
        (error) => {
            gpsStatusText.innerText = "GPS信号を検索中、またはロストしました...";
            console.error(error);
        },
        {
            enableHighAccuracy: true,
            timeout: 5000, // レスポンス速度を上げるためタイムアウトを短縮
            maximumAge: 0
        }
    );
});

window.onload = initMap;
</script>
</body>
</html>
