<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首都高周回ナビ (道なりリアルタイム追跡版)</title>
    <!-- Leaflet.js (地図表示用ライブラリ) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .nav-panel {
            background: #1e1e1e;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            border-bottom: 2px solid #2e2e2e;
        }
        h1 { 
            font-size: 1.1rem; 
            margin: 0 0 8px 0; 
            color: #00e676; 
            text-align: center;
        }
        .nav-instruction { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 6px;
            text-align: center;
        }
        .next-info { 
            font-size: 0.95rem; 
            color: #b0bec5; 
            line-height: 1.4;
            text-align: center;
            margin-bottom: 12px;
        }
        button {
            background: #00e676;
            color: #121212;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
        }
        button:disabled { 
            background: #424242; 
            color: #757575;
            box-shadow: none;
        }
        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }
        .status-bar {
            background: #1a1a1a;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #aaaaaa;
            border-top: 1px solid #2e2e2e;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="nav-panel">
    <h1>首都高周回ナビ (道なり＆リアルタイム追跡)</h1>
    <div class="nav-instruction" id="instruction">「開始」を押してください</div>
    <div class="next-info" id="nextInfo">現在地を常にマップ中心にロックし、道なりに案内します。</div>
    <button id="startBtn">ナビゲーション開始</button>
</div>

<div id="map"></div>

<div class="status-bar" id="gpsStatus">
    GPS: 未接続 | リアルタイムトラッキング無効
</div>

<script>
// ナビゲーション用のチェックポイント
const routePoints = [
    { name: "みなとみらい入口", lat: 35.4578, lng: 139.6310, radius: 400, hint: "首都高 K1 横羽線（上り）に入ります。左車線から本線へ合流してください。" },
    { name: "生麦JCT手前", lat: 35.4925, lng: 139.6730, radius: 600, hint: "このまま K1 横羽線を直進し、羽田・東京方面へ進みます。" },
    { name: "羽田可動橋付近 (K1)", lat: 35.5495, lng: 139.7510, radius: 700, hint: "まもなく東京都内に入ります。右側車線をキープして平和島方面へ。" },
    { name: "浜崎橋JCT", lat: 35.6486, lng: 139.7613, radius: 350, hint: "右側2車線へ進み、「C1 都心環状線（内回り）銀座・江戸橋方面」へ分岐します。" },
    { name: "江戸橋JCT", lat: 35.6817, lng: 139.7766, radius: 350, hint: "右側の「C1 向島・箱崎方面」の車線を維持してください。" },
    { name: "箱崎JCT", lat: 35.6812, lng: 139.7865, radius: 300, hint: "左側の「9号 深川線・湾岸線方面」へ分岐します。ロータリー構造に入りますがそのまま9号線へ。" },
    { name: "辰巳JCT", lat: 35.6436, lng: 139.8094, radius: 400, hint: "9号線の突き当たりを「右方向、B 湾岸線（下り）羽田・横浜方面」へ進みます。" },
    { name: "東海JCT付近 (湾岸線)", lat: 35.5685, lng: 139.7645, radius: 700, hint: "湾岸線を直進します。羽田空港のトンネルを通過します。" },
    { name: "大黒JCT", lat: 35.4615, lng: 139.6808, radius: 450, hint: "横浜ベイブリッジを渡るため、そのまま湾岸線を直進してください。大黒PAへも入れます。" },
    { name: "本牧JCT", lat: 35.4290, lng: 139.6705, radius: 500, hint: "ベイブリッジ通過後、左側車線へ寄り「K3 狩場線・石川町JCT方面」へ進みます。" },
    { name: "石川町JCT", lat: 35.4395, lng: 139.6425, radius: 350, hint: "JCTを「右方向、K1 横羽線・横浜駅方面」へ進み、すぐに出口の準備をします。" },
    { name: "横浜駅西口出口", lat: 35.4688, lng: 139.6165, radius: 350, hint: "ここで首都高を降ります。一般道へ合流します。お疲れ様でした！" }
];

// 「道なり」にラインを描画するための補間用形状データ（首都高の主要路線に沿った大まかなカーブを再現）
const roadPathCoordinates = [
    [35.4578, 139.6310], // みなとみらい
    [35.4640, 139.6350], [35.4750, 139.6450], [35.4850, 139.6580],
    [35.4925, 139.6730], // 生麦JCT
    [35.5020, 139.6900], [35.5150, 139.7150], [35.5300, 139.7350],
    [35.5495, 139.7510], // 羽田可動橋
    [35.5700, 139.7420], [35.6000, 139.7450], [35.6250, 139.7520],
    [35.6486, 139.7613], // 浜崎橋JCT
    [35.6600, 139.7750], [35.6720, 139.7780],
    [35.6817, 139.7766], // 江戸橋JCT
    [35.6830, 139.7820],
    [35.6812, 139.7865], // 箱崎JCT
    [35.6750, 139.7950], [35.6600, 139.8020],
    [35.6436, 139.8094], // 辰巳JCT
    [35.6250, 139.7900], [35.5950, 139.7780],
    [35.5685, 139.7645], // 東海JCT
    [35.5350, 139.7800], [35.5000, 139.7450],
    [35.4615, 139.6808], // 大黒JCT
    [35.4450, 139.6680],
    [35.4290, 139.6705], // 本牧JCT
    [35.4330, 139.6550],
    [35.4395, 139.6425], // 石川町JCT
    [35.4500, 139.6250], [35.4600, 139.6180],
    [35.4688, 139.6165]  // 横浜駅西口
];

let currentStep = 0;
let watchId = null;
let map, userMarker, userAccuracyCircle;
let pointMarkers = [];
let routeLine;

const instructionText = document.getElementById('instruction');
const nextInfoText = document.getElementById('nextInfo');
const gpsStatusText = document.getElementById('gpsStatus');
const startBtn = document.getElementById('startBtn');

function initMap() {
    // 横浜〜東京が収まる初期位置
    map = L.map('map', { zoomControl: false }).setView([35.56, 139.72], 11);
    
    // スタイリッシュで運転中に見やすいダークモードタイル
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // 道なりの太いルートラインを描画
    routeLine = L.polyline(roadPathCoordinates, { 
        color: '#00e676', 
        weight: 6, 
        opacity: 0.7,
        lineJoin: 'round'
    }).addTo(map);

    // 各案内地点のマーカーを設置
    routePoints.forEach((p, index) => {
        // 検知エリアの視覚化
        L.circle([p.lat, p.lng], {
            radius: p.radius,
            color: '#00b0ff',
            weight: 1,
            fillColor: '#00b0ff',
            fillOpacity: 0.04
        }).addTo(map);

        const marker = L.circleMarker([p.lat, p.lng], {
            radius: 6,
            fillColor: '#00b0ff',
            color: '#fff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
        }).addTo(map).bindPopup(`<b>${index + 1}. ${p.name}</b>`);
        pointMarkers.push(marker);
    });
}

function safeSpeak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP';
        window.speechSynthesis.speak(utterance);
    }
}

function getDistance(lat1, lng1, lat2, lng2) {
    const r = 6378137;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return r * c;
}

function updateNavigation() {
    pointMarkers.forEach((m, idx) => {
        m.setStyle({ fillColor: idx < currentStep ? '#757575' : '#00b0ff', radius: idx === currentStep ? 9 : 6 });
    });

    if (currentStep >= routePoints.length) {
        instructionText.innerText = "ゴールに到着！";
        nextInfoText.innerText = "横浜駅西口出口を出ました。お疲れ様でした。";
        safeSpeak("目的地周辺に到着しました。ナビゲーションを終了します。お疲れ様でした。");
        if (watchId) navigator.geolocation.clearWatch(watchId);
        return;
    }

    const currentPoint = routePoints[currentStep];
    instructionText.innerText = `次は：${currentPoint.name}`;
    nextInfoText.innerText = currentPoint.hint;
    
    if (pointMarkers[currentStep]) {
        pointMarkers[currentStep].setStyle({ fillColor: '#ff9100' });
    }
    
    safeSpeak(`次は、${currentPoint.name}です。${currentPoint.hint}`);
}

startBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
        alert("お使いの端末はGPSに対応していません。");
        return;
    }

    safeSpeak(""); // iOS用の音声登録トリガー

    startBtn.disabled = true;
    startBtn.innerText = "リアルタイム追跡中...";
    currentStep = 0;
    updateNavigation();

    // リアルタイム追跡の開始
    watchId = navigator.geolocation.watchPosition(
        (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            const speed = position.coords.speed; // m/s

            const speedKmh = speed ? Math.round(speed * 3.6) : 0;
            gpsStatusText.innerHTML = `GPS精度: ±${Math.round(accuracy)}m | 速度: ${speedKmh} km/h`;

            // 精度が著しく低いデータはスキップ
            if (accuracy > 100) return;

            // 自車位置マーカーの同期
            if (!userMarker) {
                userMarker = L.marker([userLat, userLng]).addTo(map);
                userAccuracyCircle = L.circle([userLat, userLng], { radius: accuracy, color: '#00e676', weight: 1, fillOpacity: 0.1 }).addTo(map);
            } else {
                userMarker.setLatLng([userLat, userLng]);
                userAccuracyCircle.setLatLng([userLat, userLng]).setRadius(accuracy);
            }
            
            // 【最重要】現在地を道なりに自動追従 (オートセンター)
            map.setView([userLat, userLng], 14);

            // ルート判定
            if (currentStep < routePoints.length) {
                const target = routePoints[currentStep];
                const distance = getDistance(userLat, userLng, target.lat, target.lng);

                if (distance < target.radius) {
                    // 一般道誤判定防止ロジック
                    if (target.name.includes("入口") || target.name.includes("出口") || speed === null || speedKmh > 35) {
                        currentStep++;
                        updateNavigation();
                    }
                }
            }
        },
        (error) => {
            gpsStatusText.innerText = "GPS信号を検索中...";
            console.error(error);
        },
        {
            enableHighAccuracy: true, // 高精度GPSモード
            timeout: 6000,
            maximumAge: 0
        }
    );
});

window.onload = initMap;
</script>
</body>
</html>
